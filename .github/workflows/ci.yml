name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs for the same branch on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Test · ${{ matrix.os }} · Python ${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false          # let all matrix cells finish even if one fails
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.9"
          - "3.12"
          - "3.14"

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── Python ────────────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          # Allow pre-release so 3.14 resolves even on minor patch bumps.
          allow-prereleases: true

      # ── Dependencies (dev only, never touches production code) ────────────
      - name: Install test dependencies
        run: pip install pytest pytest-cov

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: Run test suite
        run: >
          pytest tests/
          -v
          --tb=short
          --cov
          --cov-report=xml:coverage-${{ matrix.os }}-py${{ matrix.python-version }}.xml
          --cov-report=term-missing
        env:
          # Make colour output readable in CI logs.
          FORCE_COLOR: "1"
          # Prevent accidental outbound network calls during tests.
          PASLA_CI: "1"

      # ── Upload per-cell coverage artefact ─────────────────────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage-${{ matrix.os }}-py${{ matrix.python-version }}.xml
          retention-days: 14